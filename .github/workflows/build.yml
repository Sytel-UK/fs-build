name: Build
on:
  # Run manually only
  workflow_dispatch: {}
env:
  FREESWITCH_REF: v1.11.1
  # Sytel build iteration for this FREESWITCH_REF; bump when cutting a new
  # release of the same upstream version. Marks artifacts as Sytel builds
  # (Debian downstream-revision style: <upstream>-sytel.<n>).
  SYTEL_REV: sytel.0
  # sofia-sip and spandsp have no generally-available Debian packages; the
  # Debian build compiles them from source and bundles them in the archive.
  # FreeSWITCH v1.11.1 configure.ac requires sofia-sip-ua >= 1.13.17, spandsp >= 3.0
  SOFIA_SIP_REF: v1.13.17
  SPANDSP_REF: master
  # libks (SignalWire "kitchen sink") is required by FreeSWITCH configure for
  # endpoints/mod_verto: pkg-config libks2 >= 2.0.11. Built from source (CMake)
  # by build.sh and bundled in the archive; not in Debian.
  LIBKS_REF: v2.0.11
jobs:
  headers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout FreeSWITCH
        uses: actions/checkout@v7
        with:
          repository: signalwire/freeswitch
          ref: v1.11.1
      - name: FreeSWITCH Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: FreeSWITCH-Include
          path: |
            src/include
            libs/libteletone/src/*.h
  windows:
    runs-on: windows-2025
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v3
      - name: Checkout self
        uses: actions/checkout@v7
        with:
          path: fs-build
      - name: Checkout FreeSWITCH
        uses: actions/checkout@v7
        with:
          repository: signalwire/freeswitch
          ref: v1.11.1
          path: freeswitch
      - name: Setup SytelFreeswitch.sln and fs-download.vcxproj
        run: |
          Copy-Item "fs-build\SytelFreeswitch.sln" "freeswitch\SytelFreeswitch.sln" -Force
          Copy-Item "fs-build\fs-download.vcxproj" "freeswitch\fs-download.vcxproj" -Force
      - name: Download FreeSWITCH Packages
        working-directory: freeswitch
        run: msbuild fs-download.vcxproj -t:build -p:Configuration=${{matrix.configuration}} -p:Platform=x64
      - name: Provide known-good yasm.exe for ffmpeg/libvpx
        # The generic win64/yasm.exe that the build auto-downloads fails to load
        # (exit code 0xC0000135) on the VS 2026 runner. Pre-place the specific
        # build the official FreeSWITCH windows workflow uses; the download
        # target skips fetching when yasm.exe is already present.
        working-directory: freeswitch
        run: |
          curl -o libs\win32\ffmpeg\yasm.exe https://files.freeswitch.org/downloads/win64/yasm-1.3.0.87.g121a.exe
          copy libs\win32\ffmpeg\yasm.exe libs\win32\libvpx\yasm.exe
      - name: Build FreeSWITCH
        working-directory: freeswitch
        run: msbuild SytelFreeswitch.sln -t:build -maxcpucount -noWarn:C4305,C4013,C4114,C4244,C4267,C4312,C4366,C4702,D9035,MSB8004 -p:Configuration=${{matrix.configuration}} -p:Platform=x64
      - name: FreeSWITCH Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: FreeSWITCH-${{matrix.configuration}}
          path: freeswitch/x64/${{matrix.configuration}}/
  debian:
    runs-on: ubuntu-latest
    container: debian:${{ matrix.debian }}
    strategy:
      matrix:
        # Archives are ABI-tied (glibc/OpenSSL) to the Debian release they are
        # built on; the codename is part of the artifact identity. Add new
        # releases here when we adopt them.
        debian: [bookworm]
        configuration: [Debug, Release]
    steps:
      - name: Install checkout prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates
      - name: Checkout self
        uses: actions/checkout@v7
        with:
          path: fs-build
      - name: Checkout FreeSWITCH
        uses: actions/checkout@v7
        with:
          repository: signalwire/freeswitch
          ref: ${{ env.FREESWITCH_REF }}
          path: freeswitch
      - name: Checkout sofia-sip
        uses: actions/checkout@v7
        with:
          repository: freeswitch/sofia-sip
          ref: ${{ env.SOFIA_SIP_REF }}
          path: sofia-sip
      - name: Checkout spandsp
        uses: actions/checkout@v7
        with:
          repository: freeswitch/spandsp
          ref: ${{ env.SPANDSP_REF }}
          path: spandsp
      - name: Checkout libks
        uses: actions/checkout@v7
        with:
          repository: signalwire/libks
          ref: ${{ env.LIBKS_REF }}
          path: libks
      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends \
            $(grep -v '^#' fs-build/linux/build-deps.txt)
      - name: Build
        run: sh fs-build/linux/build.sh ${{ matrix.configuration }}
      - name: Package
        env:
          FS_VERSION: ${{ env.FREESWITCH_REF }}
          SYTEL_REV: ${{ env.SYTEL_REV }}
        run: sh fs-build/linux/package.sh ${{ matrix.configuration }} "$PWD/out"
      - name: FreeSWITCH Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: FreeSWITCH-Debian-${{matrix.debian}}-${{matrix.configuration}}
          path: out/
  debian-smoke:
    # Prove the archive works on a clean minimal system with only the
    # packages named in its own DEPENDENCIES.txt.
    needs: debian
    runs-on: ubuntu-latest
    container: debian:${{ matrix.debian }}-slim
    strategy:
      matrix:
        debian: [bookworm]
        configuration: [Debug, Release]
    steps:
      - name: Checkout self
        uses: actions/checkout@v7
        with:
          path: fs-build
      - name: Download archive
        uses: actions/download-artifact@v8
        with:
          name: FreeSWITCH-Debian-${{matrix.debian}}-${{matrix.configuration}}
          path: out
      - name: Smoke test
        run: |
          case "${{matrix.configuration}}" in
            Release) base="freeswitch" ;;
            Debug)   base="freeswitch-debug" ;;
          esac
          # [0-9]* pins the next component to the version, excluding -dev names
          sh fs-build/linux/smoke-test.sh out/$base-[0-9]*-${{matrix.debian}}-*.tar.gz
